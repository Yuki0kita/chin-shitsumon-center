<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本珍質問センター</title>
  <meta name="description" content="国会に提出された質問主意書のうち、特徴的な質問を全国共通形式で配信しています。">
  <meta property="og:title" content="日本珍質問センター">
  <meta property="og:description" content="国会に提出された質問主意書のうち、特徴的な質問を全国共通形式で配信しています。">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;rect width='100' height='100' rx='22' fill='%236741d9'/&gt;&lt;text x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'&gt;珍&lt;/text&gt;&lt;/svg&gt;">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title"><a href="./">日本珍質問センター</a></h1>
      <p class="site-tagline">国会でホントにあった質問と、政府のホントの返事を、ゆるっと配信しています。</p>
    </div>
  </header>

  <main class="container">
    <section aria-labelledby="featured-heading">
      <h2 id="featured-heading" class="section-heading">注目の質問</h2>
      <div id="featured-list" class="card-list">
        <p class="empty-state">読み込んでいます…</p>
      </div>
    </section>

    <section aria-labelledby="latest-heading">
      <div class="section-header">
        <h2 id="latest-heading" class="section-heading">新着の質問</h2>
        <label class="house-filter">
          <span class="visually-hidden">議院で絞り込む</span>
          <select id="house-select">
            <option value="">両院</option>
            <option value="衆議院">衆議院</option>
            <option value="参議院">参議院</option>
          </select>
        </label>
      </div>
      <div id="latest-list" class="card-list">
        <p class="empty-state">読み込んでいます…</p>
      </div>
      <p class="load-more-wrap">
        <button id="load-more" class="load-more" hidden>さらに表示</button>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>出典: 参議院・衆議院ウェブサイトの質問主意書情報を編集して配信しています。吹き出しは定型文の意訳で、原文・全文は各リンクから確認できます。</p>
      <p>質問主意書は国会法に基づく国政調査の正式な制度です。当サイトは制度や提出者を揶揄する意図を持ちません。</p>
      <p>当サイトは国会・各議院とは関係のない個人運営のサイトです。<a href="about.html">このサイトについて</a></p>
      <p id="updated-at"></p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
